name: workspace_pro
description: WorkSpace Pro - Professional Team Communication App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0
  # Fonts
  google_fonts: ^6.2.1
  # Icons
  cupertino_icons: ^1.0.6
  # State management
  provider: ^6.1.2
  # Local storage
  shared_preferences: ^2.2.3
  # WebSocket
  web_socket_channel: ^2.4.0
  # Date formatting
  intl: ^0.19.0
  # File handling
  # Image
  cached_network_image: ^3.3.1
  # URL
  url_launcher: ^6.3.0
  geolocator: ^11.0.0
  # WebRTC
  file_picker: 8.1.6
  flutter_inappwebview: ^6.1.5
  flutter_webrtc: ^1.4.1
  agora_rtc_engine: ^6.5.3
  permission_handler: ^12.0.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  